<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Payment received</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #eef2f7;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 28px;
        padding: 32px 24px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }

      .outer-icon {
        width: 76px;
        height: 76px;
        border-radius: 999px;
        background: #e9edff;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 18px;
      }

      .inner-icon {
        width: 52px;
        height: 52px;
        border-radius: 999px;
        background: #6d82f3;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 28px;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.4;
        font-weight: 700;
        color: #0f172a;
      }

      p {
        margin-top: 14px;
        margin-bottom: 24px;
        font-size: 15px;
        line-height: 1.7;
        color: #64748b;
      }

      button {
        border: none;
        background: #02024d;
        color: #fff;
        padding: 16px 20px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="outer-icon">
        <div class="inner-icon">✓</div>
      </div>

      <h1>Payment received successfully</h1>
      <p>Your payment has been confirmed. You can return to the app to continue.</p>

      <button type="button" onclick="window.close()">Close this page</button>
    </div>
  </body>
</html>
